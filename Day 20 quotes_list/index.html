<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>quotes project</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body style="height: 100vh">
    <a href="favlist.html"><button id="fav" class="btn btn-secondary ">favourite list</button></a>
    <div
      class="container d-flex flex-column justify-content-center align-items-center"
    >
      <div  class="quote-box p-3 ">
        <p id="quote-text" class="quote fs-1 fw-bold text-white">
         
        </p>
        <p id="author-text" class="fs-4 fw-medium"></p>
      </div>
      <div class="my-3">
        <button id="btn-back" class="btn btn-outline-warning">
          <i class="ri-arrow-left-long-line"> </i>Back
        </button>
        <button id="btn-like" class="btn btn-outline-danger">
          Like <i class="ri-heart-line"></i>
        </button>
        <button id="btn-next" class="btn btn-outline-success">
          Next <i class="ri-arrow-right-long-line"></i>
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
