<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body style="background-color:skyblue;">
    <div
    style="height: 100vh;width: 100%; display: flex;justify-content: center;align-items: center;flex-direction: column;">
    <h1 id ="count"style="color: blue;">0</h1>
    <button style="width:250px;height: 60px;margin: 10px; border-radius:10px;background-color:#0061ff ;"id="button1">++</button>
    <button style="width:250px;height: 60px;margin: 10px;border-radius: 10px;background-color:#9f4b68 ;"id="button2">--</button>
    <button style="width:250px;height: 60px;margin: 10px;border-radius: 10px;background-color:#a9ff68;"id="button3">*=2</button>
    <button style="width:250px;height: 60px;margin: 10px; border-radius: 10px;background-color:#f9c58d ;"id="button4">%=2</button>
    <button style="width:250px;height: 60px;margin: 10px; border-radius: 10px;background-color:#4dc9e6 ;"id="button5">Reset</button>
    

    </div>
    <script src="script.js"></script>
</body>
</html>
