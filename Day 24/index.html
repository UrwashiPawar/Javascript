</head>
<body>
  <div class="days">
      <h1>
        <span id="date"></span>
        <span id="month"></span>
        <span id="year"></span>
         <span id="day"></span>
      </h1>
    </div>

    <div class="clock">
      <div>
        <span id="hours">00</span>
        <span class="text">Hours</span>
      </div>
      <div>

        <span class="text">Minutes</span>
      </div>
      <div>
        <span id="seconds">00</span>
        <span class="text">Seconds</span>
      </div>
    </div>

  </body>
